<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitzii ලිත - 2026</title>
    <style>
        :root {
            --gold: #e2b34c;
            --bg: #fdfaf5;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        
        body { background-color: var(--bg); color: #333; padding-bottom: 100px; }

        /* පසුබිම් වීඩියෝව */
        #bg-video {
            position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%;
            z-index: -1; filter: opacity(0.2);
        }

        /* Header */
        .header {
            background: linear-gradient(to right, var(--gold), #f7e1a0);
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-weight: bold; font-size: 20px; }

        /* Main Countdown Section (වීඩියෝවේ තිබූ ආකාරයට) */
        .main-timer-section {
            text-align: center;
            padding: 30px 10px;
            background: white;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .timer-title { color: var(--gold); font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }
        .display-grid { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .box { background: #f4f4f4; padding: 10px; border-radius: 8px; min-width: 60px; }
        .box span { font-size: 22px; font-weight: bold; display: block; }
        .box label { font-size: 11px; color: #888; }

        /* Accordion Section (පින්තූරවල තිබූ ආකාරයට) */
        .nakath-list { padding: 0 15px; }
        .acc-item {
            background: var(--white);
            margin-bottom: 10px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }
        .acc-header {
            padding: 18px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer;
            font-weight: 600;
            background: #fff;
        }
        .acc-header:hover { background: #f9f9f9; }
        .acc-content {
            padding: 0 18px;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease-out;
            background: #fff;
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .acc-item.active .acc-content { padding: 15px 18px; max-height: 300px; border-top: 1px solid #f5f5f5; }
        .acc-item.active .icon { transform: rotate(180deg); }
        .icon { transition: 0.3s; color: var(--gold); font-weight: bold; }

        .time-badge {
            font-size: 0.75rem;
            background: #fff4d8;
            color: #b08a2e;
            padding: 3px 10px;
            border-radius: 20px;
            margin-top: 5px;
            display: inline-block;
        }

        /* Music Player Bar */
        .music-bar {
            position: fixed; bottom: 0; width: 100%;
            background: white; padding: 10px;
            border-top: 1px solid #eee; display: flex; align-items: center;
        }
        audio { width: 100%; height: 35px; }
    </style>
</head>
<body>

<video autoplay loop muted playsinline id="bg-video">
    <source src="1000344419.mp4" type="video/mp4">
</video>

<div class="header">
    <div class="logo">ලිත <span style="font-size: 10px;">MITZII.LK</span></div>
    <div>☰</div>
</div>

<div class="main-timer-section">
    <div class="timer-title" id="main-title">අලුත් අවුරුදු උදාවට තව,</div>
    <div class="display-grid">
        <div class="box"><span id="d">0</span><label>දින</label></div>
        <div class="box"><span id="h">00</span><label>පැය</label></div>
        <div class="box"><span id="m">00</span><label>මිනිත්තු</label></div>
        <div class="box"><span id="s">00</span><label>තත්පර</label></div>
    </div>
    <div style="font-weight: bold; color: var(--gold);" id="main-time-str">පෙ.ව. 03:21</div>
</div>

<div class="nakath-list">
    <h3 style="margin-bottom: 15px; font-size: 1rem; color: #888;">සියලුම නැකත් වේලාවන්</h3>
    <div id="items-container"></div>
</div>

<div class="music-bar">
    <audio id="audio" controls autoplay>
        <source src="https://files.catbox.moe/etcs2p.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
    const nakathData = [
        { name: "පුණ්‍ය කාලය ආරම්භය", time: "2026-04-13T08:57:00", str: "අප්‍රේල් 13 පෙ.ව. 8:57", desc: "අප්‍රේල් 13 වන සඳුදා පූර්වභාග 08.57 සිට 14 වන අඟහරුවාදා අපරභාග 03.56 දක්වා පුණ්‍ය කාලය බැවින් එම කාලය තුළ සියලු වැඩ අත්හැර ආගමික වතාවත්වල යෙදීම මැනවි." },
        { name: "අලුත් අවුරුදු උදාව", time: "2026-04-14T03:21:00", str: "අප්‍රේල් 14 පෙ.ව. 3:21", desc: "අප්‍රේල් මස 14 වන අඟහරුවාදා පූර්වභාග 03.21 ට සිංහල හා දෙමළ අලුත් අවුරුද්ද උදාවෙයි." },
        { name: "ලිප් බැඳීම (ආහාර පිසීම)", time: "2026-04-14T05:04:00", str: "අප්‍රේල් 14 පෙ.ව. 5:04", desc: "තැඹිලි පැහැති වස්ත්‍රයකින් සැරසී නැගෙනහිර දිශාව බලා ලිප් බැඳ ගිනි මොලවා එළකිරි මිශ්‍ර කිරිබතක් සහ තල මිශ්‍ර කැවිලි වර්ගයක් පිළියෙල කර ගැනීම මැනවි." },
        { name: "වැඩ ඇල්ලීම හා ආහාර අනුභවය", time: "2026-04-14T06:44:00", str: "අප්‍රේල් 14 පෙ.ව. 6:44", desc: "තැඹිලි පැහැති වස්ත්‍රයකින් සැරසී නැගෙනහිර දිශාව බලා සියලු වැඩ අල්ලා, ගනුදෙනු කොට ආහාර අනුභවය කිරීම මැනවි." },
        { name: "වැඩ ආරම්භය / ගනුදෙනු", time: "2026-04-15T09:03:00", str: "අප්‍රේල් 15 පෙ.ව. 9:03", desc: "කොළ පැහැති වස්ත්‍රාභරණයෙන් සැරසී උතුරු දිශාව බලා කිරිබත් අනුභව කර රැකී රක්ෂා සඳහා පිටත්ව යාම මැනවි." },
        { name: "හිසතෙල් ගෑම", time: "2026-04-16T09:05:00", str: "අප්‍රේල් 16 පෙ.ව. 9:05", desc: "හිසට කොහොඹ පත් ද පයට කොළොන් පත් ද තබා තෙල් ගා ස්නානය කිරීම මැනවි." },
        { name: "රැකියා පිටත්වීම", time: "2026-04-17T06:43:00", str: "අප්‍රේල් 17 පෙ.ව. 6:43", desc: "සුදු පැහැති වස්ත්‍රාභරණයෙන් සැරසී උතුරු දිශාව බලා රැකී රක්ෂා සඳහා පිටත්ව යාම මැනවි." }
    ];

    const container = document.getElementById('items-container');
    
    // Accordion නිර්මාණය
    nakathData.forEach((n, index) => {
        const item = document.createElement('div');
        item.className = 'acc-item';
        item.innerHTML = `
            <div class="acc-header" onclick="toggleAcc(this, ${index})">
                <div>
                    <div>${n.name}</div>
                    <div class="time-badge">${n.str}</div>
                </div>
                <div class="icon">▼</div>
            </div>
            <div class="acc-content">${n.desc}</div>
        `;
        container.appendChild(item);
    });

    let activeIndex = 1; // Default අවුරුදු උදාව

    function toggleAcc(el, index) {
        const parent = el.parentElement;
        document.querySelectorAll('.acc-item').forEach(i => i.classList.remove('active'));
        parent.classList.add('active');
        activeIndex = index;
        document.getElementById('main-title').innerText = nakathData[index].name + "ට තව,";
        document.getElementById('main-time-str').innerText = nakathData[index].str.split(' ').slice(2).join(' ');
    }

    // ප්‍රධාන Countdown එක Update කිරීම
    function updateMainTimer() {
        const now = new Date().getTime();
        const target = new Date(nakathData[activeIndex].time).getTime();
        const diff = target - now;

        if (diff > 0) {
            document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('h').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById('m').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById('s').innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
        } else {
            document.getElementById('d').innerText = "0";
            document.getElementById('h').innerText = "00";
            document.getElementById('m').innerText = "00";
            document.getElementById('s').innerText = "00";
        }
    }

    setInterval(updateMainTimer, 1000);
    document.querySelector('.acc-item:nth-child(2)').classList.add('active'); // Default active
</script>

</body>
</html>
