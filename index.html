<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>අලුත් අවුරුදු නැකත් - 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Lateef&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-bg: #070707;
            --gold: #dfbb6a;
            --deep-red: #c0392b;
            --soft-white: #eeeeee;
            --accent: #e67e22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--dark-bg); 
            color: var(--soft-white); 
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            padding-bottom: 130px;
        }

        /* 🌀 Smooth Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: 1s ease-in-out;
        }
        .load-circle {
            width: 60px; height: 60px; border: 2px solid transparent;
            border-top: 2px solid var(--gold); border-bottom: 2px solid var(--deep-red);
            border-radius: 50%; animation: spin 1.5s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 🕊️ Floating Elements */
        .float-item {
            position: fixed; pointer-events: none; z-index: -1;
            opacity: 0.25; font-size: 2rem; animation: floatAnim linear infinite;
        }
        @keyframes floatAnim {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-20vh) rotate(360deg); }
        }

        /* ✨ Animated Header */
        .header {
            padding: 60px 20px 40px; text-align: center;
            background: radial-gradient(circle at top, #1a1a1a, transparent);
        }
        .shaking-text {
            font-size: 2.8rem; font-weight: 600; color: var(--gold);
            letter-spacing: 2px; text-shadow: 0 10px 20px rgba(0,0,0,0.5);
            animation: softMove 4s ease-in-out infinite;
            font-family: 'Lateef', cursive;
        }
        @keyframes softMove {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); color: #fff; }
        }

        /* 🕰️ Timer Design */
        .timer-wrap { text-align: center; margin-bottom: 50px; }
        .timer-label { 
            color: var(--accent); font-size: 0.85rem; 
            letter-spacing: 3px; margin-bottom: 20px; text-transform: uppercase;
        }
        .grid { display: flex; justify-content: center; gap: 15px; }
        .box { 
            background: linear-gradient(145deg, #111, #080808);
            padding: 20px; border-radius: 15px; min-width: 85px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(223, 187, 106, 0.1);
        }
        .box span { font-size: 2.4rem; font-weight: 600; color: var(--gold); display: block; }
        .box label { font-size: 0.65rem; color: #555; font-weight: 600; }

        /* 📜 Premium List */
        .list-container { max-width: 620px; margin: 0 auto; padding: 0 20px; }
        .card {
            background: #0f0f0f; margin-bottom: 15px; border-radius: 18px;
            border: 1px solid #1a1a1a; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; left: 0; top: 0; height: 100%;
            width: 4px; background: var(--deep-red); transition: 0.3s;
        }
        .card-head { padding: 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .card-body { 
            max-height: 0; overflow: hidden; padding: 0 25px; color: #888; 
            font-size: 0.95rem; transition: 0.5s ease; line-height: 1.8;
        }
        .card.active { border-color: var(--gold); background: #151515; }
        .card.active::before { background: var(--gold); width: 6px; }
        .card.active .card-body { padding-bottom: 30px; max-height: 400px; }
        
        .n-title { font-weight: 600; color: #fff; font-size: 1.15rem; }
        .n-date { color: var(--gold); font-size: 0.85rem; margin-top: 5px; opacity: 0.8; }
        .symbol { font-size: 1.4rem; color: #333; transition: 0.4s; }
        .card.active .symbol { transform: rotate(180deg); color: var(--gold); }

        /* 🎵 Invisible Audio but Fixed Bar */
        .player-bar {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(10,10,10,0.95); padding: 15px; 
            border-top: 1px solid var(--deep-red);
            display: flex; flex-direction: column; align-items: center;
            backdrop-filter: blur(15px); z-index: 1000;
        }
        .music-info { font-size: 0.7rem; color: var(--gold); margin-bottom: 8px; letter-spacing: 1px; }
        audio { height: 30px; filter: invert(1) grayscale(1) brightness(1.5); width: 80%; max-width: 400px; }

        /* 🎖️ Footer */
        .footer { text-align: center; padding: 80px 20px; opacity: 0.6; }
        .footer b { color: var(--deep-red); font-size: 1.5rem; display: block; margin-bottom: 5px; font-family: 'Lateef'; }
        .footer span { font-size: 0.7rem; letter-spacing: 2px; color: var(--gold); }

    </style>
</head>
<body onclick="playOnFirstTouch()">

<div id="loader">
    <div class="load-circle"></div>
    <p style="margin-top: 20px; color: var(--gold); letter-spacing: 4px; font-size: 0.7rem;">MITZII DEV</p>
</div>

<div id="elements-bg"></div>

<div class="header">
    <div class="shaking-text">අලුත් අවුරුදු නැකත්</div>
</div>

<div class="timer-wrap">
    <div class="timer-label" id="target-title">සිංහල අලුත් අවුරුදු උදාවට තව</div>
    <div class="grid">
        <div class="box"><span id="d">0</span><label>Days</label></div>
        <div class="box"><span id="h">00</span><label>Hours</label></div>
        <div class="box"><span id="m">00</span><label>Mins</label></div>
        <div class="box"><span id="s">00</span><label>Secs</label></div>
    </div>
</div>

<div class="list-container" id="litha-list"></div>

<footer class="footer">
    <b>Dev Mitzii</b>
    <span>SUPPORTED BY SIRIMATH</span>
</footer>

<div class="player-bar">
    <div class="music-info">සින්දු වාදනය වේ... (Touch to Play)</div>
    <audio id="audio-ctrl" controls>
        <source src="https://files.catbox.moe/etcs2p.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
    const nakath = [
        { name: "පරණ අවුරුද්ද සඳහා ස්නානය", time: "2026-04-13T08:00:00", str: "අප්‍රේල් 13 සඳුදා", desc: "දිවුල් පත් යුෂ මිශ්‍ර නානු ගා ස්නානය කොට ඉෂ්ට දෙවියන්ගේ ආශිර්වාදය ලබා වාසය මැනවි." },
        { name: "අලුත් අවුරුදු උදාව", time: "2026-04-14T09:32:00", str: "අප්‍රේල් 14 අඟහරුවාදා පෙ.ව. 09:32", desc: "අඟහරුවාදා පූර්ව භාග 09.32 ට සිංහල අලුත් අවුරුද්ද උදාවෙයි." },
        { name: "පුණ්‍ය කාලය", time: "2026-04-14T03:08:00", str: "අප්‍රේල් 14 පෙ.ව. 03:08 සිට ප.ව. 03:56", desc: "අප්‍රේල් මස 14 වන අඟහරුවාදා පූර්ව භාග 03.08 සිට එදින අපර භාග 03.56 දක්වා පුණ්‍ය කාලය වේ." },
        { name: "ආහාර පිසීම", time: "2026-04-14T10:41:00", str: "අප්‍රේල් 14 පෙ.ව. 10:41", desc: "රන්වන් වර්ණ වස්ත්‍රාභරණයෙන් සැරසී දකුණු දිශාව බලා ලිප් බැඳ ගිනි මොලවා කිරිබතක් පිළියෙල කර ගැනීම මැනවි." },
        { name: "වැඩ ඇල්ලීම හා ආහාර අනුභවය", time: "2026-04-14T12:05:00", str: "අප්‍රේල් 14 ප.ව. 12:05", desc: "දකුණු දිශාව බලා සියලු වැඩ ඇල්ලීම, ගනුදෙනු කිරීම හා ආහාර අනුභවය සිදු කිරීම මැනවි." },
        { name: "හිසතෙල් ගෑම", time: "2026-04-15T06:54:00", str: "අප්‍රේල් 15 බදාදා පෙ.ව. 06:54", desc: "නැගෙනහිර දිශාව බලා කොහොඹ පත් යුෂ මිශ්‍ර නානු හා තෙල් ගා ස්නානය කිරීම මැනවි." },
        { name: "නව සඳ බැලීම", time: "2026-04-19T18:30:00", str: "අප්‍රේල් 19 ඉරිදා", desc: "අප්‍රේල් මස 19 වන ඉරිදා දින නව සඳ බැලීම මැනවි." },
        { name: "රැකි රක්ෂා සඳහා පිටත්ව යාම", time: "2026-04-20T06:27:00", str: "අප්‍රේල් 20 සඳුදා පෙ.ව. 06:27", desc: "සුදු වර්ණ වස්ත්‍රාභරණයෙන් සැරසී දකුණු දිශාව බලා රැකී රක්ෂා සඳහා පිටත්ව යාම මැනවි." },
        { name: "පැළ සිටුවීම", time: "2026-04-23T11:36:00", str: "අප්‍රේල් 23 බ්‍රහස්පතින්දා පෙ.ව. 11:36", desc: "දකුණු දිශාව බලා පැළ සිටුවීමේ නැකත ඉටු කිරීම මැනවි." }
    ];

    const container = document.getElementById('litha-list');
    let activeIdx = 1;

    nakath.forEach((n, i) => {
        const item = document.createElement('div');
        item.className = `card ${i === activeIdx ? 'active' : ''}`;
        item.innerHTML = `
            <div class="card-head" onclick="select(${i}, this)">
                <div><div class="n-title">${n.name}</div><div class="n-date">${n.str}</div></div>
                <div class="symbol">▾</div>
            </div>
            <div class="card-body">${n.desc}</div>
        `;
        container.appendChild(item);
    });

    function select(i, el) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        el.parentElement.classList.add('active');
        activeIdx = i;
        document.getElementById('target-title').innerText = nakath[i].name + "ට තව";
    }

    function countdown() {
        const diff = new Date(nakath[activeIdx].time) - new Date();
        if (diff > 0) {
            document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('h').innerText = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
            document.getElementById('m').innerText = Math.floor((diff / 1000 / 60) % 60).toString().padStart(2, '0');
            document.getElementById('s').innerText = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
        } else { document.querySelectorAll('.box span').forEach(s => s.innerText = "00"); }
    }
    setInterval(countdown, 1000);

    // 🌸 Automatic Song Play on Touch
    let songStarted = false;
    function playOnFirstTouch() {
        if(!songStarted) {
            const audio = document.getElementById('audio-ctrl');
            audio.play();
            songStarted = true;
        }
    }

    // Floating Items (කැවුම්, කොකිස්, කුරුල්ලෝ)
    const items = ['🥮', '🥨', '🕊️', '🌸'];
    function createFloat() {
        const el = document.createElement('div');
        el.className = 'float-item';
        el.innerText = items[Math.floor(Math.random() * items.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.animationDuration = (Math.random() * 5 + 10) + 's';
        document.getElementById('elements-bg').appendChild(el);
        setTimeout(() => el.remove(), 15000);
    }
    setInterval(createFloat, 2500);

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 1000);
        }, 1500);
    };

    // Playlist Logic
    const audio = document.getElementById('audio-ctrl');
    const tracks = ["https://files.catbox.moe/etcs2p.mp3", "https://files.catbox.moe/u4c3b5.mp3", "https://files.catbox.moe/xlhc20.mp3"];
    let cur = 0; audio.onended = () => { cur = (cur+1)%tracks.length; audio.src = tracks[cur]; audio.play(); };
</script>
</body>
</html>
