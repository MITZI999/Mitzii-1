<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>අවුරුදු නැකත් 2026</title>
    <style>
        :root {
            --bg-black: #050505;
            --card-dark: #111111;
            --fire-red: #ff2a2a;
            --fire-orange: #ff8000;
            --fire-yellow: #ffcc00;
            --text-light: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Times New Roman', serif; }
        
        body { 
            background-color: var(--bg-black);
            color: var(--text-light); 
            overflow-x: hidden;
            padding-bottom: 120px;
        }

        /* 🔄 Loading Screen (CSS Only Animation) */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 0.8s ease;
        }
        .loader-text {
            font-size: 3.5rem; font-weight: bold;
            background: linear-gradient(to right, var(--fire-red), var(--fire-yellow));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: pulseText 2s infinite alternate;
            letter-spacing: 5px;
        }
        @keyframes pulseText { from { opacity: 0.3; transform: scale(0.9); } to { opacity: 1; transform: scale(1.1); } }

        /* ✨ Background Particles */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        /* 🔥 Header (CSS Logo) */
        .header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px solid var(--fire-orange);
            background: linear-gradient(to bottom, #111, transparent);
        }
        .main-logo-text {
            font-size: 2.5rem; font-weight: bold;
            color: #fff; text-transform: uppercase; letter-spacing: 3px;
            text-shadow: 0 0 15px var(--fire-orange), 0 0 30px var(--fire-red);
            animation: fireGlow 3s infinite;
        }
        @keyframes fireGlow { 0%, 100% { text-shadow: 0 0 15px var(--fire-orange); } 50% { text-shadow: 0 0 25px var(--fire-yellow), 0 0 40px var(--fire-red); } }

        /* 🕰️ Premium Timer */
        .timer-wrap { text-align: center; margin: 40px 0; }
        .timer-heading {
            color: var(--fire-orange); font-size: 1.1rem;
            margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px;
        }
        .grid { display: flex; justify-content: center; gap: 12px; }
        .box { 
            background: var(--card-dark); padding: 20px; border-radius: 12px; 
            min-width: 80px; border: 1px solid #333; transition: 0.3s;
        }
        .box:hover { border-color: var(--fire-yellow); transform: translateY(-5px); }
        .box span { 
            font-size: 2.2rem; font-weight: bold; display: block; 
            color: var(--fire-yellow); text-shadow: 0 0 10px rgba(255,204,0,0.4);
        }
        .box label { font-size: 0.7rem; color: #777; }

        /* 📜 List Design */
        .list-container { max-width: 650px; margin: 0 auto; padding: 0 20px; }
        .card {
            background: var(--card-dark); margin-bottom: 12px; border-radius: 15px;
            border-left: 4px solid var(--fire-red); overflow: hidden; transition: 0.4s ease;
        }
        .card-head { padding: 22px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .card-body { 
            max-height: 0; overflow: hidden; padding: 0 22px; color: #999; 
            font-size: 0.95rem; transition: 0.5s ease; line-height: 1.8;
        }
        .card.active { border-left-color: var(--fire-yellow); background: #1a1a1a; box-shadow: 0 0 20px rgba(255,128,0,0.2); }
        .card.active .card-body { padding-bottom: 25px; max-height: 500px; }
        
        .n-title { font-weight: bold; color: #fff; font-size: 1.1rem; }
        .n-time { color: var(--fire-orange); font-size: 0.85rem; margin-top: 4px; font-weight: bold; }

        /* 🎵 Player Bar */
        .player-fixed {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(0,0,0,0.9); padding: 15px; 
            border-top: 2px solid var(--fire-red);
            display: flex; justify-content: center; backdrop-filter: blur(10px);
        }
        audio { height: 35px; filter: invert(1) hue-rotate(180deg) brightness(1.5); }

        .footer { text-align: center; padding: 60px 20px; color: #444; }
        .footer b { color: var(--fire-red); display: block; font-size: 1.5rem; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loader-text">MITZII</div>
</div>

<canvas id="bg-canvas"></canvas>

<div class="header">
    <div class="main-logo-text">අවුරුදු නැකත් 2026</div>
</div>

<div class="timer-wrap">
    <div class="timer-heading" id="target-name">අලුත් අවුරුදු උදාවට තව</div>
    <div class="grid">
        <div class="box"><span id="d">0</span><label>Days</label></div>
        <div class="box"><span id="h">00</span><label>Hours</label></div>
        <div class="box"><span id="m">00</span><label>Mins</label></div>
        <div class="box"><span id="s">00</span><label>Secs</label></div>
    </div>
</div>

<div class="list-container" id="nakath-list"></div>

<footer class="footer">
    <b>Dev Mitzii</b>
    OFFICIAL LITHA 2026
</footer>

<div class="player-fixed">
    <audio id="audio-ctrl" controls autoplay>
        <source src="https://files.catbox.moe/etcs2p.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
    const nakathData = [
        { name: "නව සඳ බැලීම", time: "2026-04-19T18:30:00", str: "අප්‍රේල් 19 ඉරිදා ප.ව. 06:30 න් පසු", desc: "අධිවර්ෂ සූර්ය වර්ෂය සඳහා අප්‍රේල් මස 19 වන ඉරිදා නව සඳ බැලීම මැනවි." },
        { name: "පරණ අවුරුද්ද සඳහා ස්නානය", time: "2026-04-13T08:00:00", str: "අප්‍රේල් 13 සඳුදා", desc: "අප්‍රේල් මස 13 වන සඳු දින දිවුල් පත් යුෂ මිශ්‍ර නානු ගා ස්නානය කොට ඉෂ්ට දෙවියන්ගේ ආශිර්වාදය ලබා වාසය මැනවි." },
        { name: "අලුත් අවුරුදු උදාව", time: "2026-04-14T09:32:00", str: "අප්‍රේල් 14 පෙ.ව. 09:32", desc: "අප්‍රේල් මස 14 වන අඟහරුවාදා පූර්ව භාග 09.32 ට සිංහල අලුත් අවුරුද්ද උදාවෙයි." },
        { name: "පුණ්‍ය කාලය", time: "2026-04-14T03:08:00", str: "අප්‍රේල් 14 පෙ.ව. 03:08 සිට ප.ව. 03:56", desc: "අප්‍රේල් මස 14 වන අඟහරුවාදා පූර්ව භාග 03.08 සිට එදින අපර භාග 03.56 දක්වා පුණ්‍ය කාලය වේ." },
        { name: "ආහාර පිසීම", time: "2026-04-14T10:41:00", str: "අප්‍රේල් 14 පෙ.ව. 10:41", desc: "රන්වන් වර්ණ වස්ත්‍රාභරණයෙන් සැරසි දකුණු දිශාව බලා ලිප් බැඳ ගිනි මොලවා කිරිබතක් පිළියෙල කර ගන්න මැනවි." },
        { name: "වැඩ ඇල්ලීම හා ආහාර අනුභවය", time: "2026-04-14T12:05:00", str: "අප්‍රේල් 14 ප.ව. 12:05", desc: "රන්වන් වර්ණ වස්ත්‍රාභරණයෙන් සැරසි දකුණු දිශාව බලා වැඩ ඇල්ලීම, ගනුදෙනු කිරීම හා ආහාර අනුභවය මැනවි." },
        { name: "හිසතෙල් ගෑම", time: "2026-04-15T06:54:00", str: "අප්‍රේල් 15 බදාදා පෙ.ව. 06:54", desc: "නැගෙනහිර දිශාව බලා කොහොඹ පත් යුෂ මිශ්‍ර නානු හා තෙල් ගා ස්නානය කිරීම මැනවි." }
    ];

    const container = document.getElementById('nakath-list');
    let activeIdx = 2; // Default New Year Dawn

    nakathData.forEach((n, i) => {
        const item = document.createElement('div');
        item.className = `card ${i === activeIdx ? 'active' : ''}`;
        item.innerHTML = `
            <div class="card-head" onclick="select(${i}, this)">
                <div><div class="n-title">${n.name}</div><div class="n-time">${n.str}</div></div>
                <div style="color: var(--fire-yellow);">✦</div>
            </div>
            <div class="card-body">${n.desc}</div>
        `;
        container.appendChild(item);
    });

    function select(i, el) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        el.parentElement.classList.add('active');
        activeIdx = i;
        document.getElementById('target-name').innerText = nakathData[i].name + "ට තව";
    }

    function updateTimer() {
        const diff = new Date(nakathData[activeIdx].time) - new Date();
        if (diff > 0) {
            document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('h').innerText = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
            document.getElementById('m').innerText = Math.floor((diff / 1000 / 60) % 60).toString().padStart(2, '0');
            document.getElementById('s').innerText = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
        } else { document.querySelectorAll('.box span').forEach(s => s.innerText = "00"); }
    }
    setInterval(updateTimer, 1000);

    // 🕊️ Particles Animation (No Img)
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let parts = [];
    for(let i=0; i<40; i++) parts.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*0.5, r: Math.random()*2 });

    function animate() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255, 128, 0, 0.3)";
        parts.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
            p.y -= p.s; if(p.y < 0) p.y = canvas.height;
        });
        requestAnimationFrame(animate);
    } animate();

    // Loading Screen Removal
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 800);
        }, 2000);
    });

    const audio = document.getElementById('audio-ctrl');
    const tracks = ["https://files.catbox.moe/etcs2p.mp3", "https://files.catbox.moe/u4c3b5.mp3", "https://files.catbox.moe/xlhc20.mp3"];
    let cur = 0; audio.onended = () => { cur = (cur+1)%tracks.length; audio.src = tracks[cur]; audio.play(); };
</script>
</body>
</html>
