<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitzii ලිත - 2026 අවුරුදු නැකත්</title>
    <style>
        :root {
            --gold: #FFD700;
            --orange: #FF8C00;
            --glass: rgba(255, 255, 255, 0.1);
            --dark-glass: rgba(0, 0, 0, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: #000;
            color: white;
            overflow-x: hidden;
        }

        /* 🎥 පසුබිම් වීඩියෝව */
        .bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2; filter: brightness(0.4) blur(2px);
        }

        /* ✨ Live Animation Overlay */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.8));
            z-index: -1;
        }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }

        header { text-align: center; padding: 40px 0; animation: fadeInDown 1s ease; }
        .logo { font-size: 2.8rem; color: var(--gold); font-weight: 900; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        
        .section-title { 
            color: var(--gold); text-align: center; font-size: 1.4rem; 
            margin-bottom: 25px; letter-spacing: 1px; animation: fadeIn 1.5s ease;
        }

        /* 🕰️ Countdown Cards */
        .nakath-card {
            background: var(--dark-glass);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s;
            animation: fadeInUp 0.8s ease-out;
        }

        .nakath-card:hover { transform: scale(1.02); border-color: var(--gold); }

        .n-name { font-size: 1.2rem; font-weight: bold; color: var(--gold); margin-bottom: 8px; }
        .n-info { font-size: 0.85rem; color: #ccc; margin-bottom: 15px; display: block; }

        .timer-grid { display: flex; justify-content: center; gap: 8px; }
        .t-box {
            background: rgba(255,255,255,0.08);
            padding: 12px 5px;
            border-radius: 15px;
            min-width: 65px;
            border-bottom: 3px solid var(--gold);
        }
        .t-box span { font-size: 1.5rem; font-weight: bold; color: #fff; display: block; }
        .t-box label { font-size: 0.6rem; color: var(--gold); text-transform: uppercase; }

        /* 🎵 Music Player */
        .player-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 450px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            padding: 12px; border-radius: 50px;
            border: 1px solid var(--gold); z-index: 1000;
            display: flex; align-items: center;
        }
        audio { width: 100%; height: 35px; filter: invert(1); }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        footer { text-align: center; padding: 50px 0 120px; opacity: 0.4; font-size: 0.8rem; }
    </style>
</head>
<body>

<video autoplay loop muted playsinline class="bg-video">
    <source src="1000344231.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div class="container">
    <header>
        <div class="logo">Mitzii ලිත.lk</div>
        <p style="font-size: 0.9rem; margin-top: 10px; color: #eee;">2026 සිංහල අවුරුදු චාරිත්‍ර වාරිත්‍ර</p>
    </header>

    <h2 class="section-title">නැකත් Countdown</h2>

    <div id="countdown-list">
        </div>

    <footer>
        © 2026 Developed by Mitzii Dev | All Rights Reserved
    </footer>

    <div class="player-bar">
        <audio id="audio-player" controls autoplay>
            <source src="https://files.catbox.moe/etcs2p.mp3" type="audio/mpeg">
        </audio>
    </div>
</div>

<script>
    // ✅ ඔබ දුන් නිවැරදි නැකත් දත්ත
    const nakathData = [
        { name: "🛑 පුණ්‍ය කාලය ආරම්භය", time: "2026-04-13T08:57:00", info: "අප්‍රේල් 13 පෙ.ව. 8:57" },
        { name: "🌸 අලුත් අවුරුදු උදාව", time: "2026-04-14T03:21:00", info: "අප්‍රේල් 14 පෙ.ව. 3:21" },
        { name: "🔥 ලිප් බැඳීම (ආහාර පිසීම)", time: "2026-04-14T05:04:00", info: "අප්‍රේල් 14 පෙ.ව. 5:04 (නැගෙනහිර / තැඹිලි)" },
        { name: "🍽️ වැඩ ඇල්ලීම / ආහාර අනුභවය", time: "2026-04-14T06:44:00", info: "අප්‍රේල් 14 පෙ.ව. 6:44 (නැගෙනහිර / තැඹිලි)" },
        { name: "💼 වැඩ ආරම්භය / ගනුදෙනු", time: "2026-04-15T09:03:00", info: "අප්‍රේල් 15 පෙ.ව. 9:03 (උතුර / කොළ)" },
        { name: "🛁 හිසතෙල් ගා ස්නානය", time: "2026-04-16T09:05:00", info: "අප්‍රේල් 16 පෙ.ව. 9:05" },
        { name: "🚶‍♂️ රැකියා පිටත්වීම", time: "2026-04-17T06:43:00", info: "අප්‍රේල් 17 පෙ.ව. 6:43 (උතුර / සුදු)" }
    ];

    const listContainer = document.getElementById('countdown-list');

    // Cards නිර්මාණය කිරීම
    nakathData.forEach((nakath, i) => {
        listContainer.innerHTML += `
            <div class="nakath-card" id="card-${i}">
                <div class="n-name">${nakath.name}</div>
                <span class="n-info">${nakath.info}</span>
                <div class="timer-grid">
                    <div class="t-box"><span id="d-${i}">00</span><label>දින</label></div>
                    <div class="t-box"><span id="h-${i}">00</span><label>පැය</label></div>
                    <div class="t-box"><span id="m-${i}">00</span><label>මිනි</label></div>
                    <div class="t-box"><span id="s-${i}">00</span><label>තත්</label></div>
                </div>
            </div>
        `;
    });

    // Countdown Update කිරීම
    function updateTimers() {
        const now = new Date().getTime();

        nakathData.forEach((nakath, i) => {
            const target = new Date(nakath.time).getTime();
            const diff = target - now;

            if (diff > 0) {
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById(`d-${i}`).innerText = d;
                document.getElementById(`h-${i}`).innerText = h.toString().padStart(2, '0');
                document.getElementById(`m-${i}`).innerText = m.toString().padStart(2, '0');
                document.getElementById(`s-${i}`).innerText = s.toString().padStart(2, '0');
            } else {
                document.getElementById(`card-${i}`).style.opacity = "0.4";
                document.getElementById(`card-${i}`).style.borderColor = "#00ff00";
                document.getElementById(`card-${i}`).querySelector('.timer-grid').innerHTML = "<span style='color:#00ff00'>චාරිත්‍රය ඉටුකරන වේලාව පැමිණ ඇත!</span>";
            }
        });
    }

    setInterval(updateTimers, 1000);
    updateTimers();

    // Playlist Logic
    const songs = [
        "https://files.catbox.moe/etcs2p.mp3",
        "https://files.catbox.moe/u4c3b5.mp3",
        "https://files.catbox.moe/xlhc20.mp3"
    ];
    let trackIndex = 0;
    const player = document.getElementById('audio-player');

    player.onended = () => {
        trackIndex = (trackIndex + 1) % songs.length;
        player.src = songs[trackIndex];
        player.play();
    };
</script>
</body>
</html>
