<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitzii ලිත - 2026 අවුරුදු නැකත්</title>
    <style>
        :root {
            --primary-gold: #e2b34c;
            --bg-color: #f9f6f0;
            --text-dark: #4a4a4a;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
        }

        /* 🎥 පසුබිම් වීඩියෝව */
        #bg-video {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1;
            filter: opacity(0.3); /* වීඩියෝව පසුබිමේ පමණක් පෙනීමට */
        }

        /* Header */
        .header {
            background: linear-gradient(to right, #e2b34c, #f7e1a0);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo { font-weight: bold; font-size: 24px; color: #333; }

        /* Countdown Section */
        .countdown-container {
            text-align: center;
            padding: 30px 15px;
        }

        .countdown-title {
            color: var(--primary-gold);
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .timer-display {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .time-box {
            background: white;
            padding: 10px;
            border-radius: 8px;
            min-width: 60px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .time-box span { font-size: 24px; font-weight: bold; display: block; }
        .time-box label { font-size: 12px; color: #888; }

        /* Slider Controls */
        .slider-box {
            background: white;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 300px;
            margin: 0 auto;
            padding: 10px 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .nav-btn {
            background: var(--primary-gold);
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        .active-date {
            background: var(--primary-gold);
            color: white;
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        .live-tag {
            background: #ffcc00;
            color: white;
            padding: 2px 15px;
            border-radius: 15px;
            font-size: 12px;
            margin-top: 10px;
            display: inline-block;
        }

        /* Content Info */
        .info-text {
            max-width: 600px;
            margin: 30px auto;
            line-height: 1.6;
            color: #666;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="1000344419.mp4" type="video/mp4">
    </video>

    <div class="header">
        <div class="logo">ලිත <span style="font-size: 12px;">MITZII.LK</span></div>
        <div style="font-size: 24px;">☰</div>
    </div>

    <div class="countdown-container">
        <div class="countdown-title" id="current-nakath-name">අලුත් අවුරුදු උදාවට තව,</div>
        
        <div class="timer-display">
            <div class="time-box"><span id="days">0</span><label>දින</label></div>
            <div class="time-box"><span id="hours">00</span><label>පැය</label></div>
            <div class="time-box"><span id="mins">00</span><label>මිනිත්තු</label></div>
            <div class="time-box"><span id="secs">00</span><label>තත්පර</label></div>
        </div>

        <div class="slider-box">
            <button class="nav-btn" onclick="prevNakath()">◀</button>
            <div class="active-date" id="display-date">අප්‍රේල් මස 14</div>
            <button class="nav-btn" onclick="nextNakath()">▶</button>
        </div>
        
        <div id="display-time" style="margin-top: 15px; font-weight: bold;">පූර්වභාග 03:21</div>
        <div class="live-tag">● LIVE</div>

        <div class="info-text">
            සිංහල හා දෙමළ අලුත් අවුරුද්ද ලංකාවේ විශේෂ උත්සවයකි. නැකත් අනුව කටයුතු කිරීම, කැවිලි පෙති සහ ආගමික චාරිත්‍ර ප්‍රධාන වේ.
        </div>
    </div>

    <script>
        // 2026 නිවැරදි නැකත් දත්ත (වීඩියෝවේ තිබූ ආකාරයට)
        const nakathList = [
            { name: "පුණ්‍ය කාලය ආරම්භය", time: "2026-04-13T08:57:00", dateStr: "අප්‍රේල් මස 13", timeStr: "පෙ.ව. 08:57" },
            { name: "අලුත් අවුරුදු උදාව", time: "2026-04-14T03:21:00", dateStr: "අප්‍රේල් මස 14", timeStr: "පෙ.ව. 03:21" },
            { name: "ලිප් බැඳීම (ආහාර පිසීම)", time: "2026-04-14T05:04:00", dateStr: "අප්‍රේල් මස 14", timeStr: "පෙ.ව. 05:04" },
            { name: "වැඩ ඇල්ලීම හා ආහාර අනුභවය", time: "2026-04-14T06:44:00", dateStr: "අප්‍රේල් මස 14", timeStr: "පෙ.ව. 06:44" },
            { name: "වැඩ ආරම්භය / ගනුදෙනු", time: "2026-04-15T09:03:00", dateStr: "අප්‍රේල් මස 15", timeStr: "පෙ.ව. 09:03" }
        ];

        let currentIndex = 1; // Default: අලුත් අවුරුදු උදාව

        function updateDisplay() {
            const nakath = nakathList[currentIndex];
            document.getElementById('current-nakath-name').innerText = nakath.name + "ට තව,";
            document.getElementById('display-date').innerText = nakath.dateStr;
            document.getElementById('display-time').innerText = nakath.timeStr;
        }

        function nextNakath() {
            currentIndex = (currentIndex + 1) % nakathList.length;
            updateDisplay();
        }

        function prevNakath() {
            currentIndex = (currentIndex - 1 + nakathList.length) % nakathList.length;
            updateDisplay();
        }

        function calculateTime() {
            const now = new Date().getTime();
            const target = new Date(nakathList[currentIndex].time).getTime();
            const diff = target - now;

            if (diff > 0) {
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('days').innerText = d;
                document.getElementById('hours').innerText = h.toString().padStart(2, '0');
                document.getElementById('mins').innerText = m.toString().padStart(2, '0');
                document.getElementById('secs').innerText = s.toString().padStart(2, '0');
            } else {
                document.getElementById('days').innerText = "0";
                document.getElementById('hours').innerText = "00";
                document.getElementById('mins').innerText = "00";
                document.getElementById('secs').innerText = "00";
            }
        }

        setInterval(calculateTime, 1000);
        updateDisplay();
    </script>
</body>
</html>
