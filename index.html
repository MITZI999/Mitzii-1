<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitzii Fire Litha - 2026</title>
    <style>
        :root {
            --bg-black: #050505;
            --card-bg: #111111;
            --fire-red: #ff3333;
            --fire-orange: #ff8800;
            --fire-yellow: #ffcc00;
            --text-light: #eeeeee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body { 
            background-color: var(--bg-black); 
            color: var(--text-light); 
            overflow-x: hidden; 
            padding-bottom: 140px;
        }

        /* 🔄 Loading Screen (Image larger & animated) */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 1s ease;
        }
        #loading-screen img { 
            width: 250px; /* ලොකුවට දාන්න */
            border-radius: 50%; 
            border: 5px solid var(--fire-orange);
            box-shadow: 0 0 30px rgba(255, 136, 0, 0.6);
            animation: pulseGlow 2s infinite; 
        }
        #loading-screen p { 
            margin-top: 25px; 
            background: linear-gradient(to right, var(--fire-red), var(--fire-yellow));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 1.5rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
        }

        @keyframes pulseGlow { from { transform: scale(1); opacity: 1; } to { transform: scale(1.05); opacity: 0.8; } }

        /* 🎥 Animated Background Elements */
        #bg-video {
            position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%;
            z-index: -3; filter: opacity(0.15) contrast(1.2); /* Very subtle */
        }
        #animation-canvas {
            position: fixed; top: 0; left: 0; z-index: -2; pointer-events: none;
        }

        /* 🔥 Header (Logo Image provided, larger) */
        .header {
            background: linear-gradient(135deg, #1a1a1a, #000);
            padding: 20px;
            display: flex; justify-content: center; align-items: center;
            border-bottom: 3px solid var(--fire-orange);
            box-shadow: 0 4px 20px rgba(255, 136, 0, 0.4);
            position: sticky; top: 0; z-index: 100;
        }
        .header img { height: 90px; } /* ලොකුවට දාන්න */

        /* 🕰️ Main Countdown Section (Dark & Glowing) */
        .main-timer {
            text-align: center;
            padding: 60px 20px;
            background-color: var(--card-bg);
            border-bottom: 1px solid #222;
            margin-bottom: 30px;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            animation: fadeInDown 1s ease-out;
        }
        .timer-title { 
            color: var(--fire-yellow); 
            font-size: 1.4rem; 
            font-weight: bold; 
            margin-bottom: 25px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.6);
        }
        .grid { display: flex; justify-content: center; gap: 15px; }
        .box { 
            background-color: #000; 
            padding: 20px; 
            border-radius: 15px; 
            min-width: 85px; 
            border: 2px solid #333;
            transition: 0.3s;
        }
        .box:hover { border-color: var(--fire-orange); transform: translateY(-5px); box-shadow: 0 8px 20px rgba(255, 136, 0, 0.4); }
        .box span { font-size: 32px; font-weight: bold; display: block; color: var(--fire-yellow); text-shadow: 0 0 8px rgba(255, 204, 0, 0.6); }
        .box label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

        .target-time-label {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 30px;
            background: linear-gradient(45deg, var(--fire-red), var(--fire-orange));
            color: white;
            font-weight: bold;
            border-radius: 50px;
            font-size: 1rem;
            box-shadow: 0 6px 15px rgba(255, 51, 51, 0.5);
        }

        /* 📜 Accordion Styles (Dark & Energetic) */
        .nakath-list { padding: 0 20px; max-width: 750px; margin: 0 auto; }
        .acc-item {
            background-color: var(--card-bg);
            margin-bottom: 15px;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.3s;
            animation: fadeInUp 0.8s ease-out;
        }
        .acc-header {
            padding: 25px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer;
        }
        .acc-content {
            padding: 0 30px;
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s ease;
            background-color: #151515;
            color: #ccc;
            font-size: 1rem;
            line-height: 1.8;
            text-align: justify;
        }
        .acc-item.active { border-color: var(--fire-orange); box-shadow: 0 0 20px rgba(255, 136, 0, 0.3); }
        .acc-item.active .acc-content { padding: 20px 30px 35px; max-height: 600px; border-top: 1px solid #222; }
        
        .n-title { font-weight: bold; color: var(--text-light); font-size: 1.15rem; }
        .n-time-tag { font-size: 0.85rem; color: var(--fire-orange); margin-top: 5px; font-weight: bold; }

        /* 🎵 Music Player Bar (Dark & Colorful) */
        .audio-container {
            position: fixed; bottom: 0; width: 100%;
            background-color: #000;
            padding: 20px;
            border-top: 3px solid var(--fire-red);
            z-index: 1000;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 -5px 20px rgba(255, 51, 51, 0.3);
            backdrop-filter: blur(10px);
        }
        audio { width: 100%; max-width: 600px; height: 35px; filter: invert(1) hue-rotate(180deg) saturate(1.8) contrast(1.1); } /* Dark theme & fire colors */
        .song-name { color: var(--fire-yellow); font-size: 12px; margin-bottom: 8px; font-weight: bold; text-shadow: 0 0 5px var(--fire-red); }

        /* Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>

    const nakathData = [
        { name: "නව සඳ බැලීම", time: "2026-03-20T18:00:00", str: "මාර්තු 20 සහ අප්‍රේල් 19", desc: "අධින වසන්ත වර්ෂය සඳහා මාර්තු මස 20 වන සිකුරාදා දින ද, අධිවර්ෂ සූර්ය වර්ෂය සඳහා අප්‍රේල් මස 19 වන ඉරිදා ද නව සඳ බැලීම මැනවි." },
        { name: "පරණ අවුරුද්ද සඳහා ස්නානය", time: "2026-04-13T08:00:00", str: "අප්‍රේල් 13 සඳුදා", desc: "අප්‍රේල් මස 13 වන සඳු දින දිවුල් පත් යුෂ මිශ්‍ර නානු ගා ස්නානය කොට ඉෂ්ට දෙවියන්ගේ ආශිර්වාදය ලබා වාසය මැනවි." },
        { name: "අලුත් අවුරුදු උදාව", time: "2026-04-14T09:32:00", str: "අප්‍රේල් 14 පෙ.ව. 09:32", desc: "අප්‍රේල් මස 14 වන අඟහරුවාදා පූර්ව භාග 09.32 ට සිංහල අලුත් අවුරුද්ද උදාවෙයි." },
        { name: "පුණ්‍ය කාලය", time: "2026-04-14T03:08:00", str: "අප්‍රේල් 14 පෙ.ව. 03:08 - ප.ව. 03:56", desc: "අප්‍රේල් මස 14 වන අඟහරුවාදා පූර්ව භාග 03.08 සිට එදින අපර භාග 03.56 දක්වා පුණ්‍ය කාලය වේ. මෙම කාලය තුළ ආහාර ගැනීමෙන් වලකිමින්, ආගමික කටයුතු වල යෙදී සිටීම යහපත් වේ. පුණ්‍ය කාලය ආරම්භ වීමට පෙර ආහාර ගෙන, පුණ්‍ය කාලය අවසන් වූ පසු ආහාර ගත යුතුය." },
        { name: "ආහාර පිසීම", time: "2026-04-14T10:41:00", str: "අප්‍රේල් 14 පෙ.ව. 10:41", desc: "රන්වන් වර්ණ වස්ත්‍රාභරණයෙන් සැරසි දකුණු දිශාව බලා ලිප් බැඳ ගිනි මොලවා කිරිබතක්, කැවිලි වර්ගයක් හා දී කිරිබත පිළියෙල කර ගන්න මැනවි." },
        { name: "වැඩ ඇල්ලීම, ගනුදෙනු කිරීම හා ආහාර අනුභවය", time: "2026-04-14T12:05:00", str: "අප්‍රේල් 14 ප.ව. 12:05", desc: "රන්වන් වර්ණ වස්ත්‍රාභරණයෙන් සැරසි දකුණු දිශාව බලා සියලු වැඩ ඇල්ලීම, ගනුදෙනු කිරීම හා ආහාර අනුභවය ආරම්භ කිරීම මැනවි." },
        { name: "හිසතෙල් ගෑම", time: "2026-04-15T06:54:00", str: "අප්‍රේල් 15 පෙ.ව. 06:54", desc: "නැගෙනහිර දිශාව බලා හිස කොහොඹ පත්, පයුර් කොළොන් පත් තබා පවිත‍්‍ර වස්ත්‍රාභරණයෙන් සැරසි කොහොඹ පත් යුෂ මිශ්‍ර නානු හා තෙල් ගා ස්නානය කිරීම මැනවි." },
        { name: "රැකි රක්ෂා සඳහා පිටත්ව යාම", time: "2026-04-20T06:27:00", str: "අප්‍රේල් 20 පෙ.ව. 06:27", desc: "සුදු වර්ණ වස්ත්‍රාභරණයෙන් සැරසි කිරිබතක් සහ කැවිලි මිශ්‍ර කටුවක් අනුභව කර දකුණු දිශාව බලා පිටත්ව යාම මැනවි." },
        { name: "පැළ සිටුවීම", time: "2026-04-23T11:36:00", str: "අප්‍රේල් 23 පෙ.ව. 11:36", desc: "දකුණු දිශාව බලා පැළ සිටුවීම මැනවි." }
    ];

    const container = document.getElementById('items-container');
    let activeIndex = 2; // Default අවුරුදු උදාව (index 2)

    nakathData.forEach((n, i) => {
        const item = document.createElement('div');
        item.className = `acc-item ${i === activeIndex ? 'active' : ''}`;
        item.innerHTML = `
            <div class="acc-header" onclick="updateMainTimer(${i}, this)">
                <div>
                    <div class="n-title">${n.name}</div>
                    <div class="n-time-info">${n.str}</div>
                </div>
                <div style="font-size: 11px; color: var(--fire-orange);">DETAILS</div>
            </div>
            <div class="acc-content">${n.desc}</div>
        `;
        container.appendChild(item);
    });

    function updateMainTimer(index, element) {
        document.querySelectorAll('.acc-item').forEach(el => el.classList.remove('active'));
        element.parentElement.classList.add('active');
        activeIndex = index;
        document.getElementById('target-display').innerText = nakathData[index].str;
        document.getElementById('main-title').innerText = nakathData[index].name + "ට";
    }

    // Timer Logic
    function runTimer() {
        const now = new Date().getTime();
        const target = new Date(nakathData[activeIndex].time).getTime();
        const diff = target - now;

        if (diff > 0) {
            document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('h').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById('m').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById('s').innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
        } else {
            document.querySelectorAll('.box span').forEach(s => s.innerText = "00");
        }
    }
    setInterval(runTimer, 1000);

    // Playlist Logic
    const playlist = ["https://files.catbox.moe/etcs2p.mp3", "https://files.catbox.moe/u4c3b5.mp3", "https://files.catbox.moe/xlhc20.mp3"];
    let songIdx = 0;
    const audio = document.getElementById('main-audio');
    audio.onended = () => {
        songIdx = (songIdx + 1) % playlist.length;
        audio.src = playlist[songIdx];
        audio.play();
    };

    // 🕊️ Flying Birds Animation (Dark/Fire Theme)
    const canvas = document.getElementById('animation-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let birds = [];
    for(let i=0; i<6; i++) {
        birds.push({ x: Math.random() * canvas.width, y: Math.random() * (canvas.height/2), s: Math.random() * 1.5 + 0.5, w: 0 });
    }

    let particles = [];
    for(let i=0; i<30; i++) {
        particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2, s: Math.random()*0.4 });
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw Particles (Soft Fire Orange)
        ctx.fillStyle = "rgba(255, 136, 0, 0.3)";
        particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            ctx.fill();
            p.y += p.s;
            if(p.y > canvas.height) p.y = -10;
        });

        // Draw Birds (Simplified V-shape, Dark Red)
        ctx.strokeStyle = "rgba(255, 51, 51, 0.25)";
        ctx.lineWidth = 2.5;
        birds.forEach(b => {
            ctx.beginPath();
            let wingY = Math.sin(b.w) * 6;
            ctx.moveTo(b.x, b.y + wingY);
            ctx.lineTo(b.x + 12, b.y);
            ctx.lineTo(b.x + 24, b.y + wingY);
            ctx.stroke();
            b.x += b.s; b.w += 0.1;
            if(b.x > canvas.width) b.x = -30;
        });
        requestAnimationFrame(animate);
    }
    animate();

    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };

    // 🔄 Loading Screen Logic
    window.addEventListener('load', () => {
        setTimeout(() => {
            const screen = document.getElementById('loading-screen');
            screen.style.opacity = '0';
            setTimeout(() => screen.style.display = 'none', 1000);
            document.body.style.overflow = 'auto'; // Re-enable scrolling
        }, 1800); // Show loading for at least 1.8 seconds
    });
</script>

</body>
</html>
