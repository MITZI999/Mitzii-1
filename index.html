<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>අවුරුදු නැකත් 2026</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-dark: #141414;
            --soft-red: #e74c3c;
            --soft-orange: #f39c12;
            --soft-yellow: #f1c40f;
            --text-silver: #d1d1d1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Times New Roman', serif; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-silver); 
            overflow-x: hidden;
            padding-bottom: 120px;
        }

        /* 🕊️ Background Animation */
        #bg-canvas {
            position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none;
            opacity: 0.2;
        }

        /* ✨ Animated Header */
        .header {
            padding: 60px 20px 40px;
            text-align: center;
        }

        .floating-header {
            display: inline-block;
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 4px;
            background: linear-gradient(45deg, var(--soft-red), var(--soft-orange), var(--soft-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: wave 4s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 🕰️ Premium Timer */
        .timer-container {
            text-align: center;
            margin-bottom: 50px;
        }
        .timer-label {
            color: var(--soft-orange);
            font-size: 0.9rem;
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .grid { display: flex; justify-content: center; gap: 12px; }
        .box { 
            background: var(--card-dark); 
            padding: 15px; 
            border-radius: 12px; 
            min-width: 75px; 
            border: 1px solid rgba(243, 156, 18, 0.1);
        }
        .box span { 
            font-size: 2rem; 
            font-weight: bold; 
            display: block; 
            color: var(--soft-yellow);
            animation: pulse 2s infinite;
        }
        .box label { font-size: 0.7rem; color: #555; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* 📜 Sorted List Design */
        .list-wrapper { max-width: 650px; margin: 0 auto; padding: 0 20px; }
        .nakath-card {
            background: var(--card-dark);
            margin-bottom: 12px;
            border-radius: 10px;
            border-left: 3px solid var(--soft-red);
            overflow: hidden;
            transition: 0.3s;
        }
        .nakath-card.active { border-left-color: var(--soft-yellow); background: #1a1a1a; }
        .card-top { padding: 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .card-body { 
            max-height: 0; 
            overflow: hidden; 
            padding: 0 20px; 
            color: #999; 
            font-size: 0.95rem; 
            transition: 0.4s ease;
            line-height: 1.8;
            text-align: justify;
        }
        .nakath-card.active .card-body { padding-bottom: 25px; max-height: 500px; }
        
        .n-title { font-weight: bold; color: #fff; font-size: 1.1rem; animation: textMove 5s infinite; }
        .n-date { color: var(--soft-orange); font-size: 0.85rem; margin-top: 4px; }

        @keyframes textMove {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(3px); }
        }

        /* 🎖️ Footer */
        .footer {
            text-align: center;
            padding: 60px 20px;
            color: #333;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }
        .footer b { color: var(--soft-red); display: block; font-size: 1.2rem; margin-bottom: 5px; }

        /* 🎵 Music Player */
        .player-bar {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(10,10,10,0.95);
            padding: 15px; border-top: 1px solid #222;
            display: flex; justify-content: center; backdrop-filter: blur(5px);
        }
        audio { height: 30px; filter: invert(0.8) hue-rotate(140deg); opacity: 0.6; }

    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="header">
    <div class="floating-header">අවුරුදු නැකත්</div>
</div>

<div class="timer-container">
    <div class="timer-label" id="target-title">අලුත් අවුරුදු උදාවට තව</div>
    <div class="grid">
        <div class="box"><span id="d">0</span><label>Days</label></div>
        <div class="box"><span id="h">00</span><label>Hours</label></div>
        <div class="box"><span id="m">00</span><label>Mins</label></div>
        <div class="box"><span id="s">00</span><label>Secs</label></div>
    </div>
</div>

<div class="list-wrapper" id="nakath-list"></div>

<footer class="footer">
    <b>Dev Mitzii</b>
    SUPPORTED BY SIRIMATH
</footer>

<div class="player-bar">
    <audio id="player" controls autoplay>
        <source src="https://files.catbox.moe/etcs2p.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
    const nakathData = [
        { name: "පරණ අවුරුද්ද සඳහා ස්නානය", time: "2026-04-13T08:00:00", str: "අප්‍රේල් 13 සඳුදා", desc: "අප්‍රේල් මස 13 වන සඳු දින දිවුල් පත් යුෂ මිශ්‍ර නානු ගා ස්නානය කොට ඉෂ්ට දෙවියන්ගේ ආශිර්වාදය ලබා වාසය මැනවි." },
        { name: "අලුත් අවුරුදු උදාව", time: "2026-04-14T09:32:00", str: "අප්‍රේල් 14 අඟහරුවාදා පෙ.ව. 09:32", desc: "අප්‍රේල් මස 14 වන අඟහරුවාදා පූර්ව භාග 09.32 ට සිංහල අලුත් අවුරුද්ද උදාවෙයි." },
        { name: "පුණ්‍ය කාලය", time: "2026-04-14T03:08:00", str: "අප්‍රේල් 14 පෙ.ව. 03:08 සිට ප.ව. 03:56", desc: "අප්‍රේල් මස 14 වන අඟහරුවාදා පූර්ව භාග 03.08 සිට එදින අපර භාග 03.56 දක්වා පුණ්‍ය කාලය වේ. මෙම කාලය තුළ ආගමික වත්පිළිවෙත්වල යෙදීම යහපත් වේ." },
        { name: "ආහාර පිසීම", time: "2026-04-14T10:41:00", str: "අප්‍රේල් 14 අඟහරුවාදා පෙ.ව. 10:41", desc: "රන්වන් වර්ණ වස්ත්‍රාභරණයෙන් සැරසි දකුණු දිශාව බලා ලිප් බැඳ ගිනි මොලවා කිරිබතක් හා කැවිලි පිළියෙල කර ගන්න මැනවි." },
        { name: "වැඩ ඇල්ලීම හා ආහාර අනුභවය", time: "2026-04-14T12:05:00", str: "අප්‍රේල් 14 අඟහරුවාදා ප.ව. 12:05", desc: "රන්වන් වර්ණ වස්ත්‍රාභරණයෙන් සැරසි දකුණු දිශාව බලා සියලු වැඩ ඇල්ලීම, ගනුදෙනු කිරීම හා ආහාර අනුභවය ආරම්භ කිරීම මැනවි." },
        { name: "හිසතෙල් ගෑම", time: "2026-04-15T06:54:00", str: "අප්‍රේල් 15 බදාදා පෙ.ව. 06:54", desc: "නැගෙනහිර දිශාව බලා හිසට කොහොඹ පත් ද පයට කොළොන් පත් ද තබා කොහොඹ පත් යුෂ මිශ්‍ර නානු හා තෙල් ගා ස්නානය මැනවි." },
        { name: "රැකී රක්ෂා සඳහා පිටත්ව යාම", time: "2026-04-20T06:27:00", str: "අප්‍රේල් 20 සඳුදා පෙ.ව. 06:27", desc: "සුදු වර්ණ වස්ත්‍රාභරණයෙන් සැරසි කිරිබතක් හා කැවිලි අනුභව කර දකුණු දිශාව බලා රැකී රක්ෂා සඳහා පිටත්ව යාම මැනවි." },
        { name: "පැළ සිටුවීම", time: "2026-04-23T11:36:00", str: "අප්‍රේල් 23 බ්‍රහස්පතින්දා පෙ.ව. 11:36", desc: "දකුණු දිශාව බලා පැළ සිටුවීමේ කටයුතු සිදු කිරීම මැනවි." },
        { name: "නව සඳ බැලීම", time: "2026-04-19T18:30:00", str: "අප්‍රේල් 19 ඉරිදා ප.ව. 06:30 න් පසු", desc: "නව අවුරුද්ද සඳහා අප්‍රේල් මස 19 වන ඉරිදා දින නව සඳ බැලීම මැනවි." }
    ];

    const listElement = document.getElementById('nakath-list');
    let currentActive = 1; // Default: අවුරුදු උදාව

    nakathData.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = `nakath-card ${index === currentActive ? 'active' : ''}`;
        card.innerHTML = `
            <div class="card-top" onclick="setActive(${index}, this)">
                <div><div class="n-title">${item.name}</div><div class="n-date">${item.str}</div></div>
                <div style="color: #333;">✦</div>
            </div>
            <div class="card-body">${item.desc}</div>
        `;
        listElement.appendChild(card);
    });

    function setActive(idx, el) {
        document.querySelectorAll('.nakath-card').forEach(c => c.classList.remove('active'));
        el.parentElement.classList.add('active');
        currentActive = idx;
        document.getElementById('target-title').innerText = nakathData[idx].name + "ට තව";
    }

    function runTimer() {
        const diff = new Date(nakathData[currentActive].time) - new Date();
        if (diff > 0) {
            document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('h').innerText = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
            document.getElementById('m').innerText = Math.floor((diff / 1000 / 60) % 60).toString().padStart(2, '0');
            document.getElementById('s').innerText = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
        } else { document.querySelectorAll('.box span').forEach(s => s.innerText = "00"); }
    }
    setInterval(runTimer, 1000);

    // 🕊️ Subtle Bird Animation
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let birds = []; for(let i=0; i<6; i++) birds.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height/2, s: Math.random()*0.5+0.2, w: 0 });

    function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.strokeStyle = "rgba(243, 156, 18, 0.15)";
        birds.forEach(b => {
            ctx.beginPath(); let wing = Math.sin(b.w)*4;
            ctx.moveTo(b.x, b.y+wing); ctx.lineTo(b.x+10, b.y); ctx.lineTo(b.x+20, b.y+wing);
            ctx.stroke(); b.x += b.s; b.w += 0.08; if(b.x > canvas.width) b.x = -30;
        });
        requestAnimationFrame(draw);
    } draw();

    const audio = document.getElementById('player');
    const tracks = ["https://files.catbox.moe/etcs2p.mp3", "https://files.catbox.moe/u4c3b5.mp3", "https://files.catbox.moe/xlhc20.mp3"];
    let t = 0; audio.onended = () => { t = (t+1)%tracks.length; audio.src = tracks[t]; audio.play(); };
</script>
</body>
</html>
