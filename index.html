<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>අවුරුදු නැකත් 2026</title>
    <style>
        :root {
            --bg-black: #080808;
            --card-dark: #121212;
            --fire-red: #ff3e3e;
            --fire-orange: #ff8c00;
            --fire-yellow: #ffcc00;
            --text-gray: #bbbbbb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Times New Roman', serif; }
        
        body { 
            background-color: var(--bg-black); 
            color: var(--text-gray); 
            overflow-x: hidden;
            padding-bottom: 110px;
        }

        /* 🕊️ Background Animation */
        #bg-canvas {
            position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none;
            opacity: 0.3;
        }

        /* ✨ Animated Floating Header */
        .header {
            padding: 50px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #111, transparent);
        }

        .floating-text {
            display: inline-block;
            font-size: 2.8rem;
            font-weight: bold;
            letter-spacing: 5px;
            background: linear-gradient(45deg, var(--fire-red), var(--fire-orange), var(--fire-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: waveText 3s ease-in-out infinite;
            text-shadow: 0 10px 20px rgba(255, 62, 62, 0.2);
        }

        @keyframes waveText {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(-1deg); }
            75% { transform: translateY(5px) rotate(1deg); }
        }

        /* 🕰️ Premium Timer */
        .timer-wrap {
            text-align: center;
            margin-bottom: 40px;
        }
        .timer-heading {
            color: var(--fire-orange);
            font-size: 1rem;
            margin-bottom: 25px;
            letter-spacing: 2px;
            animation: softPulse 2s infinite;
        }
        .grid { display: flex; justify-content: center; gap: 15px; }
        .box { 
            background: var(--card-dark); 
            padding: 20px; 
            border-radius: 12px; 
            min-width: 80px; 
            border: 1px solid rgba(255, 140, 0, 0.2);
            transition: 0.3s;
        }
        .box span { 
            font-size: 2.2rem; 
            font-weight: bold; 
            display: block; 
            color: var(--fire-yellow);
            animation: numFloat 4s ease-in-out infinite;
        }
        .box label { font-size: 0.7rem; color: #666; }

        @keyframes numFloat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); color: var(--fire-red); }
        }

        @keyframes softPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* 📜 List Design */
        .list-container { max-width: 650px; margin: 0 auto; padding: 0 20px; }
        .card {
            background: var(--card-dark);
            margin-bottom: 15px;
            border-radius: 15px;
            border-left: 4px solid var(--fire-red);
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card-head { padding: 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .card-body { 
            max-height: 0; 
            overflow: hidden; 
            padding: 0 25px; 
            color: #888; 
            font-size: 0.95rem; 
            transition: 0.5s ease;
            line-height: 1.8;
        }
        .card.active { transform: scale(1.02); border-left-color: var(--fire-yellow); }
        .card.active .card-body { padding-bottom: 30px; max-height: 500px; }
        
        .n-title { font-weight: bold; color: #fff; font-size: 1.15rem; }
        .n-time { color: var(--fire-orange); font-size: 0.85rem; margin-top: 5px; }

        /* 🎖️ Footer */
        .footer {
            text-align: center;
            padding: 60px 20px;
            color: #444;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }
        .footer b { color: var(--fire-red); display: block; margin-bottom: 8px; font-size: 1.3rem; }

        /* 🎵 Music Player */
        .player-fixed {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(0,0,0,0.9);
            padding: 15px; border-top: 1px solid var(--fire-red);
            display: flex; justify-content: center; backdrop-filter: blur(8px);
        }
        audio { height: 30px; filter: invert(1) sepia(1) saturate(5) hue-rotate(-20deg); }

    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="header">
    <div class="floating-text">අවුරුදු නැකත්</div>
</div>

<div class="timer-wrap">
    <div class="timer-heading" id="target-name">අලුත් අවුරුදු උදාවට තව</div>
    <div class="grid">
        <div class="box"><span id="d">0</span><label>DAYS</label></div>
        <div class="box"><span id="h">00</span><label>HOURS</label></div>
        <div class="box"><span id="m">00</span><label>MINS</label></div>
        <div class="box"><span id="s">00</span><label>SECS</label></div>
    </div>
</div>

<div class="list-container" id="nakath-list"></div>

<footer class="footer">
    <b>Dev Mitzii</b>
    SUPPORTED BY SIRIMATH
</footer>

<div class="player-fixed">
    <audio id="audio-ctrl" controls autoplay>
        <source src="https://files.catbox.moe/etcs2p.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
    const nakathData = [
        { name: "නව සඳ බැලීම", time: "2026-03-20T18:00:00", str: "මාර්තු 20 සහ අප්‍රේල් 19", desc: "අධින වසන්ත වර්ෂය සඳහා මාර්තු මස 20 වන සිකුරාදා දින ද, අධිවර්ෂ සූර්ය වර්ෂය සඳහා අප්‍රේල් මස 19 වන ඉරිදා ද නව සඳ බැලීම මැනවි." },
        { name: "පරණ අවුරුද්ද සඳහා ස්නානය", time: "2026-04-13T08:00:00", str: "අප්‍රේල් 13 සඳුදා", desc: "අප්‍රේල් මස 13 වන සඳු දින දිවුල් පත් යුෂ මිශ්‍ර නානු ගා ස්නානය කොට ඉෂ්ට දෙවියන්ගේ ආශිර්වාදය ලබා වාසය මැනවි." },
        { name: "අලුත් අවුරුදු උදාව", time: "2026-04-14T09:32:00", str: "අප්‍රේල් 14 පෙ.ව. 09:32", desc: "අප්‍රේල් මස 14 වන අඟහරුවාදා පූර්ව භාග 09.32 ට සිංහල අලුත් අවුරුද්ද උදාවෙයි." },
        { name: "පුණ්‍ය කාලය", time: "2026-04-14T03:08:00", str: "අප්‍රේල් 14 පෙ.ව. 03:08 - ප.ව. 03:56", desc: "අප්‍රේල් මස 14 වන අඟහරුවාදා පූර්ව භාග 03.08 සිට එදින අපර භාග 03.56 දක්වා පුණ්‍ය කාලය වේ." },
        { name: "ආහාර පිසීම", time: "2026-04-14T10:41:00", str: "අප්‍රේල් 14 පෙ.ව. 10:41", desc: "රන්වන් වර්ණ වස්ත්‍රාභරණයෙන් සැරසි දකුණු දිශාව බලා ලිප් බැඳ ගිනි මොලවා කිරිබතක් පිළියෙල කර ගන්න මැනවි." },
        { name: "වැඩ ඇල්ලීම හා ආහාර අනුභවය", time: "2026-04-14T12:05:00", str: "අප්‍රේල් 14 ප.ව. 12:05", desc: "රන්වන් වර්ණ වස්ත්‍රාභරණයෙන් සැරසි දකුණු දිශාව බලා වැඩ ඇල්ලීම, ගනුදෙනු කිරීම හා ආහාර අනුභවය මැනවි." },
        { name: "හිසතෙල් ගෑම", time: "2026-04-15T06:54:00", str: "අප්‍රේල් 15 පෙ.ව. 06:54", desc: "නැගෙනහිර දිශාව බලා කොහොඹ පත් යුෂ මිශ්‍ර නානු හා තෙල් ගා ස්නානය කිරීම මැනවි." }
    ];

    const container = document.getElementById('nakath-list');
    let activeIdx = 2;

    nakathData.forEach((n, i) => {
        const item = document.createElement('div');
        item.className = `card ${i === activeIdx ? 'active' : ''}`;
        item.innerHTML = `
            <div class="card-head" onclick="select(${i}, this)">
                <div><div class="n-title">${n.name}</div><div class="n-time">${n.str}</div></div>
                <div style="color: var(--fire-yellow);">✦</div>
            </div>
            <div class="card-body">${n.desc}</div>
        `;
        container.appendChild(item);
    });

    function select(i, el) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        el.parentElement.classList.add('active');
        activeIdx = i;
        document.getElementById('target-name').innerText = nakathData[i].name + "ට තව";
    }

    function countdown() {
        const diff = new Date(nakathData[activeIdx].time) - new Date();
        if (diff > 0) {
            document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('h').innerText = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
            document.getElementById('m').innerText = Math.floor((diff / 1000 / 60) % 60).toString().padStart(2, '0');
            document.getElementById('s').innerText = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
        } else { document.querySelectorAll('.box span').forEach(s => s.innerText = "00"); }
    }
    setInterval(countdown, 1000);

    // 🕊️ Floating Particle Effect
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let parts = [];
    for(let i=0; i<8; i++) parts.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height/2, s: Math.random()*0.5+0.2, w: 0 });

    function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.strokeStyle = "rgba(255, 140, 0, 0.2)";
        parts.forEach(p => {
            ctx.beginPath(); let wing = Math.sin(p.w)*4;
            ctx.moveTo(p.x, p.y+wing); ctx.lineTo(p.x+12, p.y); ctx.lineTo(p.x+24, p.y+wing);
            ctx.stroke(); p.x += p.s; p.w += 0.08; if(p.x > canvas.width) p.x = -30;
        });
        requestAnimationFrame(draw);
    } draw();

    const audio = document.getElementById('audio-ctrl');
    const playlist = ["https://files.catbox.moe/etcs2p.mp3", "https://files.catbox.moe/u4c3b5.mp3", "https://files.catbox.moe/xlhc20.mp3"];
    let track = 0; audio.onended = () => { track = (track+1)%playlist.length; audio.src = playlist[track]; audio.play(); };
</script>
</body>
</html>
